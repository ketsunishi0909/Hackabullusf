services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - ./backend/data:/app/data
    env_file:
      - ./backend/.env
    environment:
      DB_PATH: /app/data/attendees.db
      PORT: "3001"
      NODE_ENV: production
    restart: unless-stopped
